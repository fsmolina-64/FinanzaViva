<div class="min-h-screen w-full flex flex-col md:flex-row items-center justify-center md:justify-end relative overflow-hidden transition-all duration-300 bg-[#060913]">

  <video 
    autoplay 
    loop 
    muted
    [muted]="true"
    playsinline
    oncanplay="this.play()"
    onloadedmetadata="this.muted = true"
    class="absolute inset-0 w-full h-full object-cover z-10 opacity-100 pointer-events-none">
    <source src="video.mp4" type="video/mp4">
  </video>

  <div class="absolute inset-0 bg-gradient-to-r from-[#060913]/20 via-[#0a0f24]/40 to-[#060913]/80 z-20"></div>

  <div class="relative z-30 flex flex-col items-center justify-center w-full md:max-w-md p-4 md:p-0 md:mr-12 lg:mr-20 xl:mr-32 my-8">

    <div class="w-full bg-[#0f172a]/90 backdrop-blur-xl rounded-2xl p-8 shadow-[0_25px_60px_-15px_rgba(0,0,0,0.8)] border border-slate-800/80">
      <router-outlet />
    </div>

    <p class="text-slate-500 text-xs mt-6 font-medium tracking-wide drop-shadow-sm select-none text-center">
      &copy; 2026 FinanzaViva &bull; Hecho para jóvenes ecuatorianos
    </p>

  </div>
</div>
