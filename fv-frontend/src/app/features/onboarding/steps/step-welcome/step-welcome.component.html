<div class="flex flex-col items-center">

  <div class="w-28 h-28 rounded-2xl flex items-center justify-center mb-6">
    <img src="/logo-oficial.png" alt="FinanzaViva" class="w-full h-full object-contain" />
  </div>

  <h1 class="text-primary text-3xl font-bold text-center mb-3 tracking-tight">
    Bienvenido a FinanzaViva
  </h1>
  <p class="text-muted text-center mb-10 max-w-md leading-relaxed">
    Todo lo que necesitas para tomar el control de tus finanzas personales, en un solo lugar.
  </p>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full mb-10">
    @for (feature of features; track feature.label) {
      <div class="bg-card border border-default rounded-2xl p-5 flex gap-4 items-start hover:border-strong hover:scale-[1.02] transition-all duration-200">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 bg-accent-purple/10">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-accent-purple" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="feature.path" />
          </svg>
        </div>
        <div>
          <p class="text-primary font-medium text-sm">{{ feature.label }}</p>
          <p class="text-subtle text-xs mt-0.5 leading-relaxed">{{ feature.desc }}</p>
        </div>
      </div>
    }
  </div>

  <button
    (click)="next.emit()"
    class="bg-white text-gray-900 font-semibold px-10 py-3 rounded-xl hover:bg-gray-100 hover:scale-105 transition-all duration-200 text-sm cursor-pointer active:scale-95">
    Comenzar configuracion
  </button>

</div>
