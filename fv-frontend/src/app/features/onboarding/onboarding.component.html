<div class="min-h-screen flex flex-col bg-app">

  <div class="flex items-center justify-between px-7 pt-8 pb-5">
    @if (currentStep() > 0) {
      <button class="flex items-center gap-1.5 bg-none border-none text-muted hover:text-primary-light text-xs font-medium cursor-pointer py-1.5 min-w-[72px] transition-colors" (click)="prevStep()">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        Atras
      </button>
    } @else {
      <div class="min-w-[72px]"></div>
    }

    <div class="flex gap-2 justify-center">
      @for (step of steps; track $index) {
        <div
          class="h-2 w-2 rounded-full transition-all duration-300"
          [class]="currentStep() > $index ? 'bg-elevated' : currentStep() === $index ? 'bg-white w-6 rounded' : 'bg-card'">
        </div>
      }
    </div>

    <div class="min-w-[72px]"></div>
  </div>

  <div class="flex-1 flex flex-col max-w-[720px] w-full mx-auto px-6 pb-16 transition-all duration-150 step-content"
       [class.opacity-0]="transitioning()"
       [class.-translate-y-2.5]="transitioning()"
       [class.!animate-none]="transitioning()">

    @if (currentStep() === 0) {
      <app-step-welcome (next)="nextStep()" />
    }
    @if (currentStep() === 1) {
      <app-step-account (next)="nextStep()" />
    }
    @if (currentStep() === 2) {
      <app-step-transactions (next)="nextStep()" />
    }
    @if (currentStep() === 3) {
      <app-step-categories (next)="nextStep()" (categoryCreated)="onCategoryCreated($event)" />
    }
    @if (currentStep() === 4) {
      <app-step-budgets (next)="nextStep()" />
    }
    @if (currentStep() === 5) {
      <app-step-goals (next)="nextStep()" (skip)="nextStep()" />
    }
    @if (currentStep() === 6) {
      <app-step-summary
        [data]="collectedData()"
        [isLoading]="isCompleting()"
        (complete)="onComplete()" />
    }

  </div>
</div>
