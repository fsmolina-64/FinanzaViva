<nav class="topnav">
  <div class="nav-inner">
    <!-- Brand -->
    <a class="brand" routerLink="/home">
      <span class="brand-icon">🌱</span>
      <span class="brand-name">FinanzaViva</span>
    </a>

    <!-- Desktop links -->
    <div class="nav-links">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="active"
          class="nav-link"
        >
          <span class="nl-icon">{{ link.icon }}</span>
          <span>{{ link.label }}</span>
        </a>
      }
    </div>

    <!-- Right side -->
    <div class="nav-right">
      <!-- Coins badge -->
      @if (profile.profile()) {
        <div class="coin-badge">
          <span>🪙</span>
          <span>{{ profile.profile()!.coins | number }}</span>
        </div>
      }

      <!-- Profile avatar link -->
      <a routerLink="/perfil" class="avatar-btn" title="Mi Perfil">
        <span>{{ profile.profile()?.avatar ?? '👤' }}</span>
      </a>

      <!-- Logout -->
      <button class="logout-btn" (click)="logout()" title="Cerrar sesión">
        <span>↩</span>
      </button>
    </div>
  </div>
</nav>
