<nav class="bottom-nav">
  <div class="nav-inner">
    <div class="nav-coins">
      <span class="coin-icon">🪙</span>
      <span class="coin-value">{{ game.coins() | number }}</span>
    </div>

    <div class="nav-links">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          class="nav-item"
          [title]="item.label"
        >
          <span class="nav-icon">{{ item.icon }}</span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </div>

    <div class="nav-level">
      <span class="lvl-badge">Lv.{{ game.level() }}</span>
      <div class="mini-xp">
        <div class="mini-xp-fill" [style.width.%]="game.xpProgress()"></div>
      </div>
    </div>
  </div>
</nav>
